name: Build desktop installers

# Builds macOS + Linux installers on GitHub's runners and attaches them to a
# release. Windows installers are built/uploaded separately. Run manually from
# the Actions tab (or it fires on a new v* tag), passing the release tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach installers to'
        required: true
        default: v0.1.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: windows-latest
            build: npx electron-builder --win nsis --x64 --arm64 --publish never
            artifacts: dist/*.exe
          - os: macos-latest
            build: npx electron-builder --mac dmg --x64 --arm64 --publish never
            artifacts: dist/*.dmg
          - os: ubuntu-latest
            build: npx electron-builder --linux AppImage deb --x64 --publish never
            artifacts: dist/*.AppImage dist/*.deb
    runs-on: ${{ matrix.os }}
    # Use bash on every OS (incl. Windows) so $TAG and dist/*.exe globbing in the
    # upload step behave the same everywhere. Without this Windows uses PowerShell
    # and the upload fails with "release not found".
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: ${{ matrix.build }}
      - name: Upload installers to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release upload "$TAG" ${{ matrix.artifacts }} --clobber --repo "${{ github.repository }}"
